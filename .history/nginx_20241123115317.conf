events {
    worker_connections 1024;
}

http {
    include       mime.types;  # Include the mime types configuration
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        root /var/www/public;  # Laravel's public directory
        index index.php index.html index.htm;  # Default index files

        # Serve static assets like CSS, JS, and images directly
        location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff|woff2|eot|ttf|otf)$ {
            root /var/www/public;  # Ensure this path points to the Laravel public directory
            try_files $uri =404;  # Serve file or return 404
        }

        # Handle incoming requests to the root
        location / {
            try_files $uri $uri/ /index.php?$query_string;  # Forward non-found files to index.php
        }

        # Handle PHP file processing via PHP-FPM (app container)
        location ~ \.php$ {
            fastcgi_pass laravel_app:9000;  # Forward requests to PHP-FPM container (app:9000)
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/public$fastcgi_script_name;  # Correct the path to point to Laravel's public directory
            include fastcgi_params;
        }

        # Deny access to hidden files like .htaccess
        location ~ /\.ht {
            deny all;
        }
    }
}
