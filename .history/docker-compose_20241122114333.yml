version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    image: laravel_app_image
    volumes:
      - .:/var/www
    ports:
      - "8000:9000"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=test
      - DB_USERNAME=root
      - DB_PASSWORD=root_password  # Match the root password used in MySQL service
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - MAIL_DRIVER=smtp
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USERNAME=youemail@gmail.com
      - MAIL_PASSWORD=yourpassword
      - MAIL_ENCRYPTION=tls
      - APP_KEY=base64:BHHgWOGNDegpE5fqOonGYeOY9I4vinCGTYq6THsnzNU=
      - APP_DEBUG=true
      - APP_LOG_LEVEL=debug
      - APP_URL=http://localhost/
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password  # Set the MySQL root password
      MYSQL_DATABASE: test  # Set the default database
    volumes:
      - mysql_data:/var/lib/mysql  # Persistent volume for MySQL data
    networks:
      - laravel_network
    restart: always  # Ensure MySQL restarts if it fails

  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - laravel_network

volumes:
  mysql_data:  # Persistent volume for MySQL data

networks:
  laravel_network:
    driver: bridge
