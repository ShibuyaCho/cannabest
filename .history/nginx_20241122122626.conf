# The events block defines how Nginx handles events like connections and worker processes
events {
    worker_connections 1024;  # Define the maximum number of simultaneous connections
}

http {
    server {
        listen 80;
        server_name localhost;

        root /var/www/public;  # Laravel's public directory
        index index.php index.html index.htm;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass laravel_app:9000;  # Forward PHP requests to the 'app' container on port 9000
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www$document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
