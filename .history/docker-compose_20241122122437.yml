version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app  # Name of the app container
    image: laravel_app_image
    volumes:
      - .:/var/www
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=test
      - DB_USERNAME=root
      - DB_PASSWORD=root_password
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - MAIL_DRIVER=smtp
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USERNAME=youemail@gmail.com
      - MAIL_PASSWORD=yourpassword
      - MAIL_ENCRYPTION=tls
      - APP_KEY=base64:BHHgWOGNDegpE5fqOonGYeOY9I4vinCGTYq6THsnzNU=
      - APP_DEBUG=true
      - APP_LOG_LEVEL=debug
      - APP_URL=http://localhost/
    depends_on:
      - db
      - redis
    networks:
      - laravel_network  # Ensure it's part of the same network

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - .:/var/www  # Mount the Laravel project folder to Nginx container
      - ./nginx.conf:/etc/nginx/nginx.conf  # Custom Nginx config
    ports:
      - "8000:80"  # Map port 80 from the container to port 8000 on the host
    depends_on:
      - app
    networks:
      - laravel_network  # Ensure Nginx is on the same network as app
    restart: always  # Ensure Nginx restarts if it fails

  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password  # Set the MySQL root password
      MYSQL_DATABASE: test  # Set the default database
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_network  # Ensure MySQL is on the same network as app
    restart: always  # Ensure MySQL restarts if it fails

  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - laravel_network  # Ensure Redis is on the same network as app

volumes:
  mysql_data:  # Persistent volume for MySQL data

networks:
  laravel_network:
    driver: bridge  # Ensure all services are in the same network
